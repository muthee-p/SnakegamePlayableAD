<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Snake Playable Ad</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="gameContainer">

  <div id="dialoguePanel">
    <img id="character" src="Ras.png" alt="Character"
         onerror="this.style.background='#1a3a5c'; this.src='';">
    <div id="dialogueBubble">
      <div id="speakerName">Grandma</div>
      <div id="dialogueText">Collect all the apples!</div>
    </div>
  </div>

  <div id="scoreBar">
    <div id="scoreDisplay">SCORE: <span id="scoreNum">0</span></div>
</div>

<canvas id="game"></canvas>

<div id="controls">
    <div class="dpad-row" id="btn-up" >
        <img id="control-btn" src="btn_up.png" alt="btn">
    </div>
    <div class="dpad-row">
        <div class="dpad-btn" id="btn-left">
            <img id="control-btn" src="btn_left.png" alt="btn"
               ></div>
        <div class="dpad-center"></div>
        <div class="dpad-btn" id="btn-right">
            <img id="control-btn" src="btn_right.png" alt="btn"
                ></div>
    </div>
    <div class="dpad-row">
        <div class="dpad-btn" id="btn-down">
            <img id="control-btn" src="btn_down.png" alt="btn"
                ></div>
    </div>
</div>

</div>

<div id="endcard">
    <div class="stars">⭐⭐⭐</div>
  <h1>Great Job!</h1>
  <div class="subtitle">Think you can do better?</div>
  <div id="finalScore"></div>
  <button class="cta-btn" onclick="downloadGame()">Play Now →</button>
</div>

<script src="main.js"></script>

</body>
</html>
